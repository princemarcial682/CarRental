{% extends 'base.html' %}

{% block content %}
<div style="max-width:600px; margin: 40px auto; background:white; padding:30px; border-radius:12px; border:1px solid #e2e8f0;">
    <h2 style="color:#1e3a8a; margin-top:0;">Support Communications Desk</h2>
    <p style="color:#64748b;">Submit private requests or logistics service issues directly to Admin.</p>
    <form method="POST">
        <label style="font-weight:600; display:block; margin-bottom:5px;">Message Subject Line:</label>
        <input type="text" name="subject" required placeholder="e.g. Requesting Custom dropoff window or Incident report" style="width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:6px; margin-bottom:15px; box-sizing:border-box;">
        
        <label style="font-weight:600; display:block; margin-bottom:5px;">Message Narrative Detail:</label>
        <textarea name="message" required placeholder="Describe your vehicle request details..." style="width:100%; height:150px; padding:12px; border:1px solid #cbd5e1; border-radius:6px; margin-bottom:20px; box-sizing:border-box; font-family:inherit;"></textarea>
        
        <button type="submit" class="btn-turo">Send Request to Admin</button>
    </form>
</div>
{% endblock %}
